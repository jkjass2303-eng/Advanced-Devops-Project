services:
  frontend:
    image: nginx:1.27
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "8080:80"
    networks:
      - devops-net

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    restart: always
    networks:
      - devops-net

  mysql:
    image: mysql:8.4
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always
    networks:
      - devops-net

  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: always
    networks:
      - devops-net

networks:
  devops-net:
    driver: bridge

volumes:
  mysql-data:
